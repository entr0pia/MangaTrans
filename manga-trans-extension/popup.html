<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            color: #333;
            margin: 0;
            overflow-x: hidden;
        }
        h3 { margin: 0 0 12px 0; color: #1a1a1a; font-size: 15px; font-weight: 600; }
        .config-item { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-size: 12px; color: #666; font-weight: 500; }
        input[type="text"], 
        input[type="password"],
        select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
            background: #fafafa;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ff4d4f;
            background: #fff;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .save-btn {
            width: 100%;
            padding: 10px;
            background: #ff4d4f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 5px;
            font-size: 14px;
        }
        .save-btn:hover { background: #ff7875; }
        .status {
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            color: #52c41a;
            height: 14px;
        }
        .hint { font-size: 11px; color: #999; margin-top: 3px; line-height: 1.2; }
        .divider { border: 0; border-top: 1px solid #f0f0f0; margin: 12px 0; }
        .toggle-card {
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #fff1f0; 
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 1px solid #ffa39e; 
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="toggle-card">
        <span style="font-weight: 600; color: #cf1322; font-size: 13px;">启用自动翻译</span>
        <input type="checkbox" id="autoTranslate"
            style="width: 18px; height: 18px; cursor: pointer; accent-color: #ff4d4f;">
    </div>
    <h3 style="font-size: 14px; margin-bottom: 8px;">API 配置</h3>
    <div class="config-item">
        <label for="baseUrl">基础地址 (Base URL)</label>
        <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1">
    </div>
    <div class="config-item">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
    </div>
    <div class="config-item">
        <label for="modelName">模型名称</label>
        <input type="text" id="modelName" placeholder="gemini-3.1-flash-lite-preview">
    </div>
    <div class="divider"></div>

    <div class="grid-2">
    <div class="config-item">
        <label for="targetLang">目标语言</label>
        <select id="targetLang">
            <option value="简体中文">简体中文</option>
            <option value="繁體中文">繁體中文</option>
            <option value="English">English</option>
            <option value="日本語">日本語</option>
            <option value="한국어">한국어</option>
            <option value="Русский">Русский</option>
        </select>
    </div>
        <div class="config-item">
            <label for="writingMode">排版偏好</label>
            <select id="writingMode">
                <option value="auto">自动（跟随原文）</option>
                <option value="horizontal">强制横排</option>
                <option value="vertical">强制竖排</option>
            </select>
        </div>
        </div>

        <div class="config-item">
            <label for="reasoningEffort">推理等级</label>
            <select id="reasoningEffort" style="padding: 6px 10px;">
                <option value="none">none (关闭)</option>
                <option value="minimal">Minimal (默认)</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
    <button class="save-btn" id="saveBtn">保存配置</button>
    <div id="status" class="status"></div>

    <script src="popup.js"></script>
</body>
</html>
